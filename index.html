<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Àjọkẹ́ Kitchen | Premium Nigerian Cuisine</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #006633;
    --accent: #d4af37;
    --dark: #1a1a1a;
    --bg: #f9f7f2;
}

* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }

body {
    background: #f9f7f2 url("https://www.transparenttextures.com/patterns/kente-cloth.png");
    color:#2c2c2c;
}

/* NAV */
nav {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding: 1rem 6%;
    display:flex;
    justify-content:space-between;
    position:fixed;
    width:100%;
    z-index:1000;
}

.logo {
    font-family:'Playfair Display';
    font-size:1.8rem;
    color:var(--primary);
}

#cart-counter {
    background:#e8f5e9;
    padding:8px 15px;
    border-radius:20px;
    font-weight:600;
}

/* HERO */
header {
    height:70vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:white;
    background:
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
        url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    background-attachment:fixed;
    position:relative;
}

header::after {
    content:"";
    position:absolute;
    inset:0;
    background:url("https://www.transparenttextures.com/patterns/african-pattern.png");
    opacity:0.15;
}

.hero-content { position:relative; z-index:2; }

.hero-content h1 {
    font-family:'Playfair Display';
    font-size:clamp(2.8rem,7vw,4.5rem);
}

.hero-content p {
    color:var(--accent);
    letter-spacing:3px;
    margin-top:10px;
}

/* LAYOUT */
.container {
    max-width:1300px;
    margin:60px auto;
    padding:0 4%;
    display:grid;
    grid-template-columns:1fr 350px;
    gap:40px;
}

@media(max-width:1000px){
    .container { grid-template-columns:1fr; }
}

/* MENU */
.category-title {
    font-family:'Playfair Display';
    font-size:2.2rem;
    border-bottom:2px solid var(--accent);
    margin-bottom:20px;
}

.menu-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:25px;
}

.menu-item {
    background:white;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:0.4s;
    position:relative;
}

.menu-item::before {
    content:"";
    height:4px;
    width:100%;
    background:linear-gradient(to right,var(--accent),transparent);
    position:absolute;
    top:0;
}

.menu-item:hover {
    transform:translateY(-10px);
}

.menu-item img {
    width:100%;
    height:230px;
    object-fit:cover;
    transition:0.4s;
}

.menu-item:hover img {
    transform:scale(1.05);
}

.menu-content {
    padding:20px;
    text-align:center;
}

.menu-content h3 {
    font-family:'Playfair Display';
}

.price {
    color:var(--primary);
    font-weight:700;
}

.add-btn {
    width:100%;
    margin-top:10px;
    padding:10px;
    border:1px solid var(--primary);
    background:none;
    cursor:pointer;
    transition:0.3s;
}

.add-btn:hover {
    background:var(--primary);
    color:white;
}

/* CART */
.cart-box {
    background:white;
    padding:30px;
    position:sticky;
    top:100px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.cart-item {
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.total {
    margin-top:20px;
    font-weight:700;
}

/* BUTTON */
.checkout-btn {
    width:100%;
    margin-top:20px;
    padding:15px;
    background:var(--primary);
    color:white;
    border:none;
    cursor:pointer;
}

/* WHATSAPP BUTTON */
.whatsapp {
    margin-top:10px;
    background:#25D366;
}

/* FOOTER */
footer {
    background:var(--dark);
    color:#aaa;
    text-align:center;
    padding:40px;
    margin-top:50px;
}
</style>
</head>

<body>

<nav>
<div class="logo">Àjọkẹ́ Kitchen</div>
<div id="cart-counter">🛒 0</div>
</nav>

<header>
<div class="hero-content">
<h1>Authentic Nigerian Flavours</h1>
<p>Luxury Taste • Cultural Roots</p>
</div>
</header>

<div class="container">

<main>
<h2 class="category-title">Our Specials</h2>

<div class="menu-grid">

<div class="menu-item">
<img src="https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a" />
<div class="menu-content">
<h3>Party Jollof Rice</h3>
<span class="price">₦3,500</span>
<button class="add-btn" onclick="addToCart('Jollof Rice',3500)">Add</button>
</div>
</div>

<div class="menu-item">
<img src="https://images.unsplash.com/photo-1625944525533-473f1a3d54e7" />
<div class="menu-content">
<h3>Egusi & Pounded Yam</h3>
<span class="price">₦4,500</span>
<button class="add-btn" onclick="addToCart('Egusi',4500)">Add</button>
</div>
</div>

<div class="menu-item">
<img src="https://images.unsplash.com/photo-1603048588665-791ca8aea617" />
<div class="menu-content">
<h3>Yam & Egg Sauce</h3>
<span class="price">₦3,200</span>
<button class="add-btn" onclick="addToCart('Yam & Egg',3200)">Add</button>
</div>
</div>

</div>
</main>

<aside>
<div class="cart-box">
<h3>Your Order</h3>

<div id="cartItems">No items yet</div>

<div class="total">Total: ₦<span id="total">0</span></div>

<button class="checkout-btn" onclick="checkout()">Checkout</button>

<button class="checkout-btn whatsapp" onclick="orderWhatsApp()">Order via WhatsApp</button>
</div>
</aside>

</div>

<footer>
<p>© 2026 Àjọkẹ́ Kitchen • Lagos</p>
</footer>

<script>
let cart = [];
let total = 0;

function addToCart(name, price){
    cart.push({name, price});
    total += price;
    updateUI();
}

function updateUI(){
    document.getElementById("cart-counter").innerText = "🛒 " + cart.length;

    let itemsHTML = "";
    cart.forEach(item=>{
        itemsHTML += `<div class="cart-item">
            <span>${item.name}</span>
            <span>₦${item.price}</span>
        </div>`;
    });

    document.getElementById("cartItems").innerHTML = itemsHTML || "No items yet";
    document.getElementById("total").innerText = total;
}

function checkout(){
    if(cart.length === 0){
        alert("Select something first");
        return;
    }
    alert("Order placed successfully!");
    cart=[]; total=0; updateUI();
}

/* WHATSAPP INTEGRATION */
function orderWhatsApp(){
    if(cart.length === 0){
        alert("No items selected");
        return;
    }

    let message = "Hello, I'd like to order:%0A";
    cart.forEach(item=>{
        message += `- ${item.name} (₦${item.price})%0A`;
    });
    message += `%0ATotal: ₦${total}`;

    let phone = "234XXXXXXXXXX"; // PUT YOUR NUMBER
    window.open(`https://wa.me/${phone}?text=${message}`, "_blank");
}
</script>

</body>
</html>
